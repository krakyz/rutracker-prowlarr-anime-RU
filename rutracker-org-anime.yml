---
id: rutracker-org-anime
name: rutracker.org (anime)
description: RuTracker is one of the most popular Russian torrent trackers.
language: ru-RU
type: semi-private
encoding: windows-1251
followredirect: true
links:
  - https://rutracker.org/
  - https://rutracker.net/

login:
  method: form
  path: forum/login.php
  form: form[action="login.php"]
  inputs:
    login_username: "{{ .Config.username }}"
    login_password: "{{ .Config.password }}"
    login: Login
    redirect: index.php
  error:
    - selector: "#login-form-full table.forumline .warnColor1"
  test:
    path: 'forum/index.php'
    selector: '#logged-in-username'

settings:
  - name: username
    type: text
    label: Username

  - name: password
    type: password
    label: Password

  - name: sort
    type: select
    label: Sort requested from site
    default: 10
    options:
      1: created
      10: seeders
      7: size
      2: title

  - name: type
    type: select
    label: Order requested from site
    default: 2
    options:
      2: desc
      1: asc

search:
  paths:
    - path: forum/tracker.php

  keywordsfilters:
    - name: diacritics
      args: replace
    - name: re_replace
      args: ["(?i)\\bS0*(\\d+)\\b", "сезон $1"]
    - name: re_replace
      args: ["(?i)\\bS0*(\\d+)E0*(\\d+)\\b", "сезон $1 серия $2"]

  inputs:
    f: '{{ join .Categories "," }}'
    o: "{{ .Config.sort }}"
    s: "{{ .Config.type }}"
    nm: "{{ .Keywords }}"

  rows:
    selector: 'div#search-results tr:has(a[href^="viewtopic.php?t="])'

  fields:
    category:
      selector: a[href^="tracker.php?f="]
      attribute: href
      filters:
        - name: querystring
          args: f

    title:
      selector: a[href^="viewtopic.php?t="]
      filters:
        - name: replace
          args: [ "\u00A0", " " ]

        # 1. МАСТЕР-ФИЛЬТР
        - name: re_replace
          args:
            - '^(?<rus>(?:(?!\s*\((?:\u0422\u0412|TV|\u0421\u0435\u0437\u043E\u043D|Season)\s*-?\s*\d+)[^/])*?)(?:\s*\((?:\u0422\u0412|TV|\u0421\u0435\u0437\u043E\u043D|Season)\s*-?\s*(?<season>\d+)[^)]*\))?\s*/\s*(?<romaji>(?:(?!\s+/\s+|\s*\[)[^\[])*?)(?:\s+/\s+[^\[]*?)*\s*\[(?<type>[^\]]+)\](?=(?:(?:(?!\[\d{4}(?:-\d{4})?(?:,|\])))[\s\S])*?\[(?!\d{4}(?:-\d{4})?(?:,|\]))[^\]]*?(?<eps>\d+(?:-\d+)?)[^\]]*\])?(?=(?:(?:(?!\[\d{4}(?:-\d{4})?(?:,|\])))[\s\S])*?\[(?<audio>[^\]]*?(?:RUS|JAP|ENG|Sub|Dub|\u043E\u0437\u0432\u0443\u0447\u043A\u0430)[^\]]*?)\])?(?=(?:(?:(?!\[\d{4}(?:-\d{4})?(?:,|\])))[\s\S])*?\[(?<hardsub>[^\]]*?\u0445\u0430\u0440\u0434\u0441\u0430\u0431[^\]]*?)\])?.*?\[(?<year>\d{4})(?:-\d{4})?(?=[^\]]*\])(?:(?=[^\]]*?(?<quality>BDRemux|BDRip|WEB-DLRip|WEBRip|WEB-DL|HDTVRip|HDRemux|HDTV|TVRip|DVD|UHD\s*BDRip|UHD\s*BDRemux)))?(?:(?=[^\]]*?(?<hdr>HDR10\+|HDR10|Dolby\s*Vision|HLG|HDR)))?[^\]]*\](?:\s*\[(?<res>\d+p)\])?(?<tail>.*)$'
            - '${romaji} S0${season} E--${eps} (${year}) [${quality} ${res}] [${hdr}] [${audio}] [${hardsub}] ${tail} -RuTracker'

        # 2. Очистка висячих пробелов внутри скобок (например, если нет качества: "[ 1080p]" -> "[1080p]")
        - name: re_replace
          args: [ '\[\s+', '[' ]

        - name: re_replace
          args: [ '\s+\]', ']' ]

        # 3. Удаление пустых скобок (если HDR или хардсаб отсутствовали)
        - name: re_replace
          args: [ '\[\]', '' ]

        # 4. Очистка пустых маркеров S0
        - name: re_replace
          args: [ '\s+S0\s+', ' ' ]

        # 5. Фикс двузначных сезонов (S012 -> S12)
        - name: re_replace
          args: [ 'S0(\d{2,})', 'S$1' ]

        # 6. ЖЕСТКИЙ СРЕЗ МУСОРА ОТ ЭПИЗОДОВ ("E--1-12 из 12+" -> "E--1-12")
        - name: re_replace
          args: [ 'E--(\d+(?:-\d+)?).*?(?=\s+\()', 'E--$1' ]

        # 7. Добавляем 'E' к диапазонам: E--1-13 -> E01-13
        - name: re_replace
          args: [ 'E--(\d+)-(\d+)', 'E$1-$2' ]

        # 8. Добавляем 'E' к одиночным пакам (24 из 24): E--24 -> E01-24
        - name: re_replace
          args: [ 'E--(\d+)', 'E01-$1' ]

        # 9. Удаление пустых E-- (для Movie/OVA)
        - name: re_replace
          args: [ '\s*E--\s*', ' ' ]

        # 10. БЕЗОПАСНАЯ СТРАХОВКА: Если нет буквы S, но есть эпизоды, добавляем S01
        - name: re_replace
          args: [ '^(?!.*S\d+)(.*?)\s+(E\d+)', '$1 S01$2' ]

        # 11. Склеиваем сезон и эпизод: S02 E01-12 -> S02E01-12
        - name: re_replace
          args: [ '(S\d+)\s+(E\d+)', '$1$2' ]

        # 12. Финальная зачистка множественных пробелов
        - name: re_replace
          args: [ '\s{2,}', ' ' ]

        - name: trim

    details:
      selector: a[href^="viewtopic.php?t="]
      attribute: href

    download:
      selector: a.tr-dl
      attribute: href

    size:
      selector: a.tr-dl

    seeders:
      selector: b.seedmed

    leechers:
      selector: td.leechmed

    grabs:
      selector: td.leechmed+td

    date:
      selector: td.leechmed+td+td
      attribute: data-ts_text

    downloadvolumefactor:
     text: 1
    uploadvolumefactor:
      text: 1

caps:
  categorymappings:
    - { id: 33, cat: TV/Anime, desc: "Аниме" }
    - { id: 1106, cat: TV/Anime, desc: "Онгоинги (HD Video)" }
    - { id: 1105, cat: TV/Anime, desc: "Аниме (HD Video)" }
    - { id: 599, cat: TV/Anime, desc: "Аниме (DVD)" }
    - { id: 1389, cat: TV/Anime, desc: "Аниме (основной подраздел)" }
    - { id: 1391, cat: TV/Anime, desc: "Аниме (плеерный подраздел)" }
    - { id: 2491, cat: TV/Anime, desc: "Аниме (QC подраздел)" }
    - { id: 2544, cat: TV/Anime, desc: "Ван-Пис" }
    - { id: 1642, cat: TV/Anime, desc: "Гандам" }
    - { id: 1390, cat: TV/Anime, desc: "Наруто" }
    - { id: 404, cat: TV/Anime, desc: "Покемоны" }
    - { id: 893, cat: TV/Anime, desc: "Японские мультфильмы" }

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]